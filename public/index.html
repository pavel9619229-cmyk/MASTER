<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Запись на услугу</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="background-pattern"></div>

		<main class="layout">
			<section class="panel panel-main">
				<header class="header">
					<p class="eyebrow">Онлайн-календарь</p>
					<h1>Запись на услугу</h1>
					<p class="subtitle">
						Статус слота меняется при каждом клике: цвет и подпись обновляются сразу для КЛИЕНТА и МАСТЕРА.
					</p>
				</header>

				<div class="toolbar">
					<div class="role-switch">
						<label for="role">Режим:</label>
						<select id="role">
							<option value="customer">КЛИЕНТ</option>
							<option value="executor">МАСТЕР</option>
						</select>
					</div>

					<div id="customer-data" class="customer-data">
						<label>
							Имя КЛИЕНТА
							<input id="customerName" type="text" maxlength="60" placeholder="Например, Иван" />
						</label>
						<label>
							Телефон
							<input id="customerPhone" type="tel" maxlength="30" placeholder="+7 900 123-45-67" />
						</label>
					</div>
				</div>

				<div id="calendar-wrapper" class="calendar-wrapper"></div>
			</section>

			<aside class="panel panel-side">
				<section id="settings-section">
					<h2>Рабочие часы МАСТЕРА</h2>
					<form id="settings-form" class="settings-form">
						<label>
							Начало
							<input id="startHour" type="number" min="0" max="23" value="9" />
						</label>
						<label>
							Конец
							<input id="endHour" type="number" min="1" max="24" value="18" />
						</label>
						<label>
							Слот (мин)
							<select id="slotMinutes">
								<option value="15">15</option>
								<option value="30" selected>30</option>
								<option value="60">60</option>
							</select>
						</label>
						<fieldset class="workdays-fieldset">
							<legend>Рабочие дни</legend>
							<div class="workdays-group">
								<label class="day-label"><input type="checkbox" name="workDay" value="1" checked /><span>Пн</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="2" checked /><span>Вт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="3" checked /><span>Ср</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="4" checked /><span>Чт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="5" checked /><span>Пт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="6" /><span>Сб</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="0" /><span>Вс</span></label>
							</div>
						</fieldset>
						<button type="submit" class="btn primary">Применить</button>
					</form>
				</section>

				<p id="hint" class="hint"></p>
			</aside>
		</main>

		<script src="/socket.io/socket.io.js"></script>
		<script src="app.js"></script>
	</body>
</html>
