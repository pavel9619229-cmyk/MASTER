<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Запись на услугу</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
		<script>window.PAGE_ROLE = "customer";</script>
	</head>
	<body>
		<div class="background-pattern"></div>

		<main class="layout">
			<section class="panel panel-main">
				<header class="header">
					<p class="eyebrow">Онлайн-календарь</p>
					<h1>Запись на услугу</h1>
					<p class="subtitle">
						Нажмите на свободный слот, чтобы записаться, или отмените уже сделанную запись.
					</p>
				</header>

				<div class="toolbar">
					<div class="view-toggle">					<button id="view-day" type="button" class="btn view-btn">День</button>						<button id="view-week" type="button" class="btn view-btn active">Неделя</button>
						<button id="view-month" type="button" class="btn view-btn">Месяц</button>
					</div>
					<div id="week-nav" class="week-nav" aria-label="Навигация по неделям">
						<button id="week-prev" type="button" class="btn">← Неделя</button>
						<div id="week-label" class="week-label"></div>
						<button id="week-next" type="button" class="btn">Неделя →</button>
					</div>
					<div id="month-nav" class="week-nav hidden" aria-label="Навигация по месяцам">
						<button id="month-prev" type="button" class="btn">← Месяц</button>
						<div id="month-label" class="week-label"></div>
						<button id="month-next" type="button" class="btn">Месяц →</button>
					</div>
					<div id="customer-data" class="customer-data">
						<label>
							Ваше имя
							<input id="customerName" type="text" maxlength="60" placeholder="Например, Иван" />
						</label>
						<label>
							Телефон
							<input id="customerPhone" type="tel" maxlength="30" placeholder="+7 900 123-45-67" />
						</label>
					</div>
				</div>

				<div id="calendar-wrapper" class="calendar-wrapper"></div>
			</section>

			<aside class="panel panel-side">
				<p id="hint" class="hint"></p>
			</aside>
		</main>

		<script src="/socket.io/socket.io.js"></script>
		<script src="app.js"></script>
	</body>
</html>
