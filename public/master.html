<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Запись — Мастер</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
		<script>window.PAGE_ROLE = "executor";</script>
	</head>
	<body class="master-page">
		<div class="background-pattern"></div>

		<div class="master-topbar">
			<header class="header">
				<p class="eyebrow">Онлайн-календарь для записи на парикмахерские услуги к мастеру</p>
				<h1>Личный кабинет мастера</h1>
				<p class="subtitle">Личный кабинет мастера для управления расписанием и подтверждением заявок онлан.</p>
			</header>

			<div class="toolbar master-toolbar">
				<div class="view-toggle">
					<button id="view-day" type="button" class="btn view-btn">День</button>
					<button id="view-week" type="button" class="btn view-btn active">Неделя</button>
					<button id="view-month" type="button" class="btn view-btn">Месяц</button>
				</div>
				<div id="week-nav" class="week-nav" aria-label="Навигация по неделям">
					<button id="week-prev" type="button" class="btn">← Неделя</button>
					<div id="week-label" class="week-label"></div>
					<button id="week-next" type="button" class="btn">Неделя →</button>
				</div>
				<div id="month-nav" class="week-nav hidden" aria-label="Навигация по месяцам">
					<button id="month-prev" type="button" class="btn">← Месяц</button>
					<div id="month-label" class="week-label"></div>
					<button id="month-next" type="button" class="btn">Месяц →</button>
				</div>
				<button id="master-settings-btn" type="button" class="btn">Настройки мастера</button>
				<form method="POST" action="/logout" style="margin:0">
					<button type="submit" class="btn logout-btn">Выйти</button>
				</form>
			</div>
		</div>

		<main class="layout">
			<section class="panel panel-main">
				<div id="calendar-wrapper" class="calendar-wrapper"></div>
			</section>

			<aside class="panel panel-side">
				<section id="settings-section">
					<form id="settings-form" class="settings-form">
						<fieldset class="workdays-fieldset master-data-fieldset">
							<legend>Данные мастера</legend>
							<label>
								Имя мастера
								<input id="master-name" name="masterName" type="text" maxlength="80" placeholder="Например, Анна" />
							</label>
							<label>
								Телефон мастера
								<input id="master-phone" name="masterPhone" type="tel" maxlength="30" placeholder="+7 900 123-45-67" />
							</label>
							<div class="master-data-actions">
								<button id="save-master-profile" type="button" class="btn primary">Сохранить</button>
							</div>
						</fieldset>
						<fieldset class="workdays-fieldset work-days-fieldset">
							<legend>Рабочие дни</legend>
							<div class="workdays-group">
								<label class="day-label"><input type="checkbox" name="workDay" value="1" /><span>Пн</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="2" checked /><span>Вт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="3" /><span>Ср</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="4" /><span>Чт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="5" checked /><span>Пт</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="6" /><span>Сб</span></label>
								<label class="day-label"><input type="checkbox" name="workDay" value="0" /><span>Вс</span></label>
							</div>
							<button type="submit" class="btn primary">Сохранить</button>
						</fieldset>
						<fieldset class="workdays-fieldset">
							<legend>Рабочие часы</legend>
							<div class="work-hours-group">
								<label>
									С
									<input id="work-start-hour" name="workStartHour" type="number" min="0" max="23" step="1" value="9" />
								</label>
								<label>
									До
									<input id="work-end-hour" name="workEndHour" type="number" min="1" max="24" step="1" value="18" />
								</label>
								<button id="save-work-hours" type="button" class="btn primary">Сохранить</button>
							</div>
						</fieldset>
					</form>
				</section>

				<p id="hint" class="hint"></p>
			</aside>
		</main>

		<script src="/socket.io/socket.io.js"></script>
		<script src="app.js"></script>
	</body>
</html>
