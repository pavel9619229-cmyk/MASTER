<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Свободное время для записи</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
		<script>
			window.PAGE_ROLE = "customer";
			window.CUSTOMER_PAGE_MODE = "availability";
		</script>
	</head>
	<body class="customer-page customer-availability-page">
		<div class="background-pattern"></div>

		<main class="layout">
			<section class="panel panel-main">
				<a class="back-link" href="/">← Назад к карточкам</a>

				<div class="customer-cards" aria-label="Карточки клиента">
					<section class="customer-card customer-card-intro">
						<h1 class="customer-intro-title">
							Онлайн-календарь для записи на парикмахерские услуги мастера
							<span id="customer-master-name">Анна</span>,
							тел. <span id="customer-master-phone">+79031234568</span>,
							по адресу <span id="customer-master-address">...</span>.
						</h1>
						<div id="customer-data" class="customer-data">
							<label>
								Ваше имя
								<input id="customerName" type="text" maxlength="60" placeholder="Например, Иван" />
							</label>
							<label>
								Телефон
								<input id="customerPhone" type="tel" maxlength="30" placeholder="+7 900 123-45-67" />
							</label>
						</div>
					</section>

					<section class="customer-card customer-card-status">
						<p class="customer-card-title">Информация о наличии записи на данный момент</p>
						<p id="hint" class="hint"></p>
					</section>

					<section class="customer-card customer-card-controls">
						<p class="customer-card-title">Выберите формат просмотра свободного времени</p>
						<div class="view-toggle customer-view-toggle">
							<button id="view-day" type="button" class="btn view-btn">Дни</button>
							<button id="view-week" type="button" class="btn view-btn active">4 недели</button>
						</div>
						<div id="week-nav" class="week-nav" aria-label="Навигация по неделям">
							<button id="week-prev" type="button" class="btn">←</button>
							<div id="week-label" class="week-label"></div>
							<button id="week-next" type="button" class="btn">→</button>
						</div>
						<div id="month-nav" class="week-nav hidden" aria-label="Навигация по месяцам">
							<button id="month-prev" type="button" class="btn">←</button>
							<div id="month-label" class="week-label"></div>
							<button id="month-next" type="button" class="btn">→</button>
						</div>
					</section>
				</div>

				<div id="calendar-wrapper" class="calendar-wrapper"></div>
			</section>
		</main>

		<script src="/socket.io/socket.io.js"></script>
		<script src="app.js"></script>
	</body>
</html>
